name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'webui/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: # 允許手動觸發

permissions:
  contents: write   # peaceiris/actions-gh-pages 需要寫入 gh-pages 分支

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webui/package-lock.json

      - name: Install dependencies
        working-directory: webui
        run: npm ci

      - name: Build
        working-directory: webui
        run: npm run build
        env:
          # 在 GitHub repo Settings > Variables 設定 VITE_WS_URL
          # 例如: wss://stockprice-backend.onrender.com
          VITE_WS_URL: ${{ vars.VITE_WS_URL }}

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: webui/dist
          # SPA 路由支援：把 404 導向 index.html
          enable_jekyll: false
